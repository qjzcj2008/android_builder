name: Aplayer2.0_build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout android_builder 本仓库（可选：保留方便后续放脚本/配置）
      - name: Checkout android_builder
        uses: actions/checkout@v4

      # 2) 先 clone 目标项目（否则 setup-java 的 Gradle cache 会找不到 gradle 文件而报错）
      - name: Clone APlayer branch
        run: |
          git clone --depth=1 --branch "2.0-lyric-order-text-fix" --recurse-submodules \
            https://github.com/qjzcj2008/APlayer.git project

      # 3) 按“最前面 workflow”的环境：JDK 17 + temurin + Gradle cache
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # 4) （保留你的逻辑）Clone third-party —— 已按你的要求注释掉
      #    如果以后要启用，取消注释并确保目录存在：project/app/src/third-party/
      #
      # - name: Clone third-party
      #   working-directory: ./project/app/src/third-party/
      #   run: |
      #     git clone --depth=1 https://github.com/hexise/jaudiotagger-android.git

      # 5) Build Debug
      - name: Build APlayer app (Debug)
        working-directory: ./project
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      # 6) 上传构建产物（和你最先的 workflow 类似：上传 outputs）
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: snapshot
          path: project/app/build/outputs/
