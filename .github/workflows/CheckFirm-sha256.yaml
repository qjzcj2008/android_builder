name: Build upstream CheckFirm (debug apk)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout upstream repo (ducthoe/CheckFirm@main)
        uses: actions/checkout@v4
        with:
          repository: ducthoe/CheckFirm
          ref: main
          path: upstream

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create ephemeral debug keystore + keystore.properties
        shell: bash
        working-directory: upstream
        run: |
          set -euo pipefail

          # Generate keystore under app/ so Gradle's file("ci-debug.jks") resolves correctly
          keytool -genkeypair \
            -v \
            -keystore app/ci-debug.jks \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=CI Debug,O=CI,C=US"

          cat > keystore.properties <<'EOF'
          storeFile=ci-debug.jks
          storePassword=android
          keyAlias=androiddebugkey
          keyPassword=android
          EOF

      - name: Make gradlew executable
        working-directory: upstream
        run: chmod +x ./gradlew

      - name: Disable Gradle wrapper checksum verification (remove distributionSha256Sum; do not commit)
        working-directory: upstream
        shell: bash
        run: |
          set -euo pipefail
          FILE="gradle/wrapper/gradle-wrapper.properties"

          echo "== Before =="
          grep -n '^distributionUrl=' "$FILE" || true
          grep -n '^distributionSha256Sum=' "$FILE" || true

          sed -i '/^distributionSha256Sum=/d' "$FILE"

          echo "== After =="
          grep -n '^distributionUrl=' "$FILE" || true
          grep -n '^distributionSha256Sum=' "$FILE" || true

      - name: Force re-download Gradle wrapper distribution (clean wrapper cache)
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ~/.gradle/wrapper/dists/gradle-9.4.1-bin || true
          find ~/.gradle/wrapper/dists -type f -name "*.part" -delete || true

      #- name: Nuke Firebase (remove google-services plugin and firebase deps; do not commit)
      #  shell: bash
      #  working-directory: upstream
      #  run: |
      #    set -euo pipefail
      #    FILE="app/build.gradle.kts"
#
      #    echo "== Before (matching lines) =="
      #    grep -nE 'libs\.plugins\.google\.gms|libs\.bundles\.firebases' "$FILE" || true
#
      #    # Remove: alias(libs.plugins.google.gms)
      #    perl -i -0pe 's/^[ \t]*alias\(libs\.plugins\.google\.gms\)\s*\R//mg' "$FILE"
#
      #    # Remove: implementation(libs.bundles.firebases)
      #    perl -i -0pe 's/^[ \t]*implementation\(libs\.bundles\.firebases\)\s*\R//mg' "$FILE"
#
      #    echo "== After (matching lines) =="
      #    grep -nE 'libs\.plugins\.google\.gms|libs\.bundles\.firebases' "$FILE" || true

      #- name: Nuke OneUI Spinner (replace custom view with TextView; do not commit)
      #  shell: bash
      #  working-directory: upstream
      #  run: |
      #    set -euo pipefail
#
      #    FILE="oneui/src/spinner/res/layout/layout_oneui_spinner_item.xml"
#
      #    echo "== Before (line 1) =="
      #    sed -n '1p' "$FILE"
#
      #    # Replace only the opening tag on line 1
      #    sed -i '1s#^<com\.bluesion\.oneui\.spinner\.OneUISpinnerTextView xmlns:android="http://schemas\.android\.com/apk/res/android"#<TextView xmlns:android="http://schemas.android.com/apk/res/android"#' "$FILE"
#
      #    echo "== After (line 1) =="
      #    sed -n '1p' "$FILE"

      - name: Create dummy google-services.json (debug only; do not commit)
        shell: bash
        working-directory: upstream
        run: |
          set -euo pipefail

          # Put it in all common locations the plugin searches
          mkdir -p app/src/debug

          cat > app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "123456789012",
              "project_id": "dummy-project",
              "storage_bucket": "dummy-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789012:android:0123456789abcdef012345",
                  "android_client_info": {
                    "package_name": "com.illusion.checkfirm"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyDummyDummyDummyDummyDummyDummyDummy"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON

          # Also place a copy under src/debug/ for variants that prefer it
          cp app/google-services.json app/src/debug/google-services.json

          echo "Dummy google-services.json created:"
          ls -la app/google-services.json app/src/debug/google-services.json

      - name: Disable FirebaseInitProvider (avoid crash without real Firebase config; do not commit)
        shell: bash
        working-directory: upstream
        run: |
          set -euo pipefail
      
          FILE="app/src/main/AndroidManifest.xml"
      
          if [ ! -f "$FILE" ]; then
            echo "::error::AndroidManifest.xml not found at $FILE"
            exit 1
          fi
      
          echo "Patching $FILE to disable FirebaseInitProvider..."
      
          # 1) Ensure tools namespace exists on the <manifest> tag
          if ! grep -q 'xmlns:tools="http://schemas.android.com/tools"' "$FILE"; then
            # Add xmlns:tools to the first <manifest ...> occurrence
            perl -i -0pe 's/<manifest\b/<manifest xmlns:tools="http:\/\/schemas.android.com\/tools"/ if $. == 1' "$FILE" || true
            # More reliable: replace only first occurrence
            perl -0777 -i -pe 's/<manifest\b(?![^>]*\bxmlns:tools=)/<manifest xmlns:tools="http:\/\/schemas.android.com\/tools"/' "$FILE"
          fi
      
          # 2) If a FirebaseInitProvider remove-statement already exists, do nothing
          if grep -q 'tools:node="remove"' "$FILE" && grep -q 'com\.google\.firebase\.provider\.FirebaseInitProvider' "$FILE"; then
            echo "FirebaseInitProvider removal already present; skipping."
            exit 0
          fi
      
          # 3) Insert provider removal inside the first <application ...> tag
          perl -0777 -i -pe 's|(<application\b[^>]*>)|$1\n\n        <!-- CI patch: disable Firebase auto-init (no real google-services.json) -->\n        <provider\n            android:name="com.google.firebase.provider.FirebaseInitProvider"\n            android:authorities="${applicationId}.firebaseinitprovider"\n            tools:node="remove" />\n|s' "$FILE"
      
          echo "==== Patched manifest snippet ===="
          # Show a small snippet around <application> and FirebaseInitProvider
          awk 'NR>=1 && NR<=200 {print NR ":" $0}' "$FILE" | sed -n '1,200p' | grep -n -E 'manifest|application|FirebaseInitProvider|tools:' -C 3 || true
      
      
            - name: Patch oneui Kotlin sourceSets (temporary; do not commit)
              shell: bash
              working-directory: upstream
              run: |
                set -euo pipefail
      
                FILE="oneui/build.gradle.kts"
      
                echo "Patching $FILE ..."
      
                # 1) 确保没有显式 kotlin android plugin（AGP 9 会报错）
                #    这里不强行改 plugins 块，只做删除（如果你之前加过）
                sed -i '/org\.jetbrains\.kotlin\.android/d' "$FILE"
      
                # 2) 在 sourceSets/main 里注入 kotlin.srcDirs（如果尚未存在）
                #    通过在 "java { ... }" 代码块后面追加一段 kotlin.srcDirs(...)
                if ! grep -q 'kotlin\.srcDirs' "$FILE"; then
                  perl -0777 -i -pe 's/(getByName\("main"\)\s*\{\s*.*?java\s*\{\s*.*?\}\s*)/\1\n\n            kotlin.srcDirs(\n                "src\/divider\/kotlin",\n                "src\/edittext\/kotlin",\n                "src\/spinner\/kotlin",\n                "src\/switch\/kotlin",\n                "src\/tab\/kotlin",\n            )\n/sms' "$FILE"
                fi
      
                echo "==== Patched snippet (sourceSets) ===="
                grep -n 'sourceSets' -n "$FILE" -A80 | sed -n '1,120p' || true

      - name: Fallback - copy oneui kotlin sources into src/main/kotlin (temporary; do not commit)
        shell: bash
        working-directory: upstream
        run: |
          set -euo pipefail

          # 如果 Kotlin 仍然显示 NO-SOURCE，则把分散目录同步到标准目录
          # 注意：这里用 compileDebugKotlin 来探测是否有源码被识别
          if ./gradlew :oneui:compileDebugKotlin --dry-run | grep -q 'compileDebugKotlin'; then
            # 运行一次真正的 task 并捕获输出，用于判断 NO-SOURCE
            set +e
            OUT="$(./gradlew :oneui:compileDebugKotlin --info 2>&1)"
            CODE=$?
            set -e

            echo "$OUT" | tail -n 200

            if echo "$OUT" | grep -q 'NO-SOURCE'; then
              echo "Kotlin sources still not detected; copying to oneui/src/main/kotlin ..."

              mkdir -p oneui/src/main/kotlin

              rsync -a oneui/src/divider/kotlin/ oneui/src/main/kotlin/ || true
              rsync -a oneui/src/edittext/kotlin/ oneui/src/main/kotlin/ || true
              rsync -a oneui/src/spinner/kotlin/ oneui/src/main/kotlin/ || true
              rsync -a oneui/src/switch/kotlin/ oneui/src/main/kotlin/ || true
              rsync -a oneui/src/tab/kotlin/ oneui/src/main/kotlin/ || true

              echo "Copied. Re-running kotlin compile to confirm..."
              ./gradlew :oneui:compileDebugKotlin --info
            else
              echo "Kotlin sources detected after patch; no copy needed."
            fi

            # 如果 compileDebugKotlin 本身就失败了（非 NO-SOURCE），仍然返回失败
            if [ $CODE -ne 0 ] && ! echo "$OUT" | grep -q 'NO-SOURCE'; then
              exit $CODE
            fi
          fi

      - name: Build Debug APK
        working-directory: upstream
        run: ./gradlew :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CheckFirm-debug-apk
          path: upstream/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
