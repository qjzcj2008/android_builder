name: Build upstream CheckFirm (debug apk)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout upstream repo (ducthoe/CheckFirm@main)
        uses: actions/checkout@v4
        with:
          repository: ducthoe/CheckFirm
          ref: main
          path: upstream

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create ephemeral debug keystore + keystore.properties
        shell: bash
        working-directory: upstream
        run: |
          set -euo pipefail

          keytool -genkeypair \
            -v \
            -keystore ci-debug.jks \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=CI Debug,O=CI,C=US"

          cat > keystore.properties <<'EOF'
          storeFile=ci-debug.jks
          storePassword=android
          keyAlias=androiddebugkey
          keyPassword=android
          EOF

      - name: Make gradlew executable
        working-directory: upstream
        run: chmod +x ./gradlew

      - name: Disable Gradle wrapper checksum verification (remove distributionSha256Sum; do not commit)
        working-directory: upstream
        shell: bash
        run: |
          set -euo pipefail
          FILE="gradle/wrapper/gradle-wrapper.properties"

          echo "== Before =="
          grep -n '^distributionUrl=' "$FILE" || true
          grep -n '^distributionSha256Sum=' "$FILE" || true

          sed -i '/^distributionSha256Sum=/d' "$FILE"

          echo "== After =="
          grep -n '^distributionUrl=' "$FILE" || true
          grep -n '^distributionSha256Sum=' "$FILE" || true

      - name: Force re-download Gradle wrapper distribution (clean wrapper cache)
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ~/.gradle/wrapper/dists/gradle-9.4.1-bin || true
          find ~/.gradle/wrapper/dists -type f -name "*.part" -delete || true

      - name: Nuke Firebase (remove google-services plugin and firebase deps; do not commit)
        shell: bash
        working-directory: upstream
        run: |
          set -euo pipefail
          FILE="app/build.gradle.kts"

          echo "== Before (matching lines) =="
          grep -nE 'libs\.plugins\.google\.gms|libs\.bundles\.firebases' "$FILE" || true

          # Remove: alias(libs.plugins.google.gms)
          perl -i -0pe 's/^[ \t]*alias\(libs\.plugins\.google\.gms\)\s*\R//mg' "$FILE"

          # Remove: implementation(libs.bundles.firebases)
          perl -i -0pe 's/^[ \t]*implementation\(libs\.bundles\.firebases\)\s*\R//mg' "$FILE"

          echo "== After (matching lines) =="
          grep -nE 'libs\.plugins\.google\.gms|libs\.bundles\.firebases' "$FILE" || true

      - name: Build Debug APK
        working-directory: upstream
        run: ./gradlew :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CheckFirm-debug-apk
          path: upstream/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
